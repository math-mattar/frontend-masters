<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Masters</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="header">
      <img
        src="./assets/coffee_masters_logo.png"
        alt="coffee masters logo"
        class="logo"
      />

      <h1 class="brand">Coffee Masters</h1>
    </header>

    <main class="main">
      <section class="order box">
        <h2 class="box-title">ITEMS</h2>

        <ul class="items">
          <li class="item">
            <p class="item-quantity">1x</p>
            <p class="item-title">Cappucino</p>
            <p class="item-price">$6.00</p>
            <ul class="item-options-list">
              <li class="item-option">Light Foam</li>
            </ul>
          </li>
          <li class="item">
            <p class="item-quantity">1x</p>
            <p class="item-title">Cappucino</p>
            <p class="item-price">$7.90</p>
            <ul class="item-options-list">
              <li class="item-option">Almond Milk</li>
              <li class="item-option">Double Espresso Shot</li>
            </ul>
          </li>
          <li class="item">
            <p class="item-quantity">1x</p>
            <p class="item-title">Croissant</p>
            <p class="item-price">$5.37</p>
            <ul class="item-options-list">
              <li class="item-option">Butter</li>
            </ul>
          </li>
        </ul>
      </section>

      <section class="payment">
        <div class="name-box box">
          <h2 class="box-title">NAME</h2>

          <div class="input-group">
            <label for="name" class="user-input-label">Name for order</label>
            <input type="text" class="user-input" id="name" />
          </div>
        </div>

        <div class="payment-box box">
          <h2 class="box-title">PAYMENT</h2>

          <div class="input-group">
            <label for="cc" class="user-input-label">CCV number</label>
            <input type="text" class="user-input" id="cc" />
          </div>

          <div class="input-group">
            <label for="ccv" class="user-input-label">Card number</label>
            <input type="text" class="user-input short-input" id="ccv" />
          </div>
        </div>
      </section>

      <section class="total">
        <table class="total-table">
          <tbody>
            <tr>
              <td>Subtotal:</td>
              <td>$19.27</td>
            </tr>

            <tr>
              <td>Tax:</td>
              <td>$0.96</td>
            </tr>

            <tr>
              <td>Total:</td>
              <td>$20.23</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <footer class="checkout">
      <button class="checkout-btn">Place order</button>
    </footer>
  </body>
</html>
